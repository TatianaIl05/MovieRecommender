name: Deploy Recommender

on:
  push:
    branches: [ main ]
    paths:
      - 'recommender/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-recommender.yml'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/recommender-ci.yml
  
  deploy:
    needs: test
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /root/MovieRecommender
          git pull origin main
          docker-compose up -d --build recommender
          docker-compose logs --tail=50 recommender
