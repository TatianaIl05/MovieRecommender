name: Recommender CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'recommender/**'
      - '.github/workflows/recommender-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'recommender/**'
      - '.github/workflows/recommender-ci.yml'
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: recommender/requirements.txt
    
    - name: Install dependencies
      working-directory: ./recommender
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check syntax with Python compile
      working-directory: ./recommender
      run: python -m py_compile api.py recommender.py
